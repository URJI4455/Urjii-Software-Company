<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Service | Urjii Software</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="padding-top: 100px;">
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo-container">
                <img src="logo.png" class="logo-img" alt="Logo">
                <div class="logo-text"><span class="text-gold">Urjii</span><span class="text-black">Software</span></div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li class="notif-wrapper"><i class="fa-solid fa-bell notif-icon"></i><span class="notif-badge" id="notifBadge">0</span><div class="notif-dropdown" id="notifDropdown"></div></li>
            </ul>
        </div>
    </header>

    <main class="container" style="max-width: 800px; padding-bottom: 80px;">
        <h1 class="section-title">Project Inquiry</h1>
        <p style="text-align: center; color: var(--primary-color); font-size: 1.2rem; font-weight: bold; margin-bottom: 30px;">🔥 Get up to 30% discount on your first project with us!</p>
        
        <div class="card" style="text-align: left;">
            <div class="progress-bar-container"><div class="progress-bar" id="orderProgress" style="width: 50%;"></div><span class="step-indicator">Step 1/2</span></div>
            
            <form id="orderForm">
                <!-- STEP 1 -->
                <div class="form-step active">
                    <h3 style="margin-bottom: 20px; color: var(--primary-color);">1. Personal & Company Details</h3>
                    <div class="form-grid">
                        <div class="form-group"><label>First Name *</label><input type="text" id="fullName" class="form-control" required></div>
                        <div class="form-group"><label>Last Name *</label><input type="text" class="form-control" required></div>
                        <div class="form-group"><label>Email Address *</label><input type="email" id="email" class="form-control" required></div>
                        <div class="form-group"><label>Phone Number *</label><input type="text" id="phone" class="form-control" required></div>
                        <div class="form-group"><label>Company Name *</label><input type="text" id="companyName" class="form-control" required></div>
                        <div class="form-group"><label>Job Title</label><input type="text" placeholder="Owner, Manager..." class="form-control"></div>
                    </div>
                    <button type="button" class="btn next-btn" style="width: 100%; margin-top: 15px;">Next Step <i class="fa-solid fa-arrow-right"></i></button>
                </div>

                <!-- STEP 2 -->
                <div class="form-step">
                    <h3 style="margin-bottom: 20px; color: var(--primary-color);">2. Project Details</h3>
                    <div class="form-group"><label>Service Selection *</label>
                        <select id="serviceType" class="form-control" required>
                            <option value="Web Development">Web Development</option>
                            <option value="App Development" disabled>App Development (Upcoming)</option>
                            <option value="E-learning" disabled>E-learning (Upcoming)</option>
                            <option value="System Development" disabled>System Development (Upcoming)</option>
                        </select>
                    </div>
                    <div class="form-grid">
                        <div class="form-group"><label>Launch Date *</label><input type="date" id="launchDate" class="form-control" required></div>
                        <div class="form-group"><label>Budget Range (ETB) *</label>
                            <select id="budgetRange" class="form-control" required>
                                <option value="10k-30k">10,000 - 30,000 ETB</option>
                                <option value="30k-70k">30,000 - 70,000 ETB</option>
                                <option value="70k-100k">70,000 - 100,000 ETB</option>
                                <option value="100k+">100,000+ ETB</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group"><label>Project Description *</label><textarea id="businessProblem" class="form-control" rows="4" required></textarea></div>
                    
                    <div style="display: flex; gap: 15px; margin-top: 20px;">
                        <button type="button" class="btn prev-btn" style="background: #888; flex: 1;">Back</button>
                        <button type="submit" class="btn" style="flex: 2;">Submit Request</button>
                    </div>
                </div>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
</body>
                                                    </html>
